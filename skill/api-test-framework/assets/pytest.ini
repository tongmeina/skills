[pytest]
# ============================================================
# pytest 配置 — API 自动化测试框架
# ============================================================

# 命令行默认参数
addopts = -vs --alluredir=./temps --clean-alluredir

# 测试用例搜索路径
testpaths = ./testcases

# 测试文件匹配规则
python_files = test_*.py
python_classes = Test_*
python_functions = test_*

# 自定义标记（按需扩展）
markers =
    run: 使用 pytest-ordering 控制测试执行顺序
    first: 第一个运行（pytest-ordering）
    last: 最后一个运行（pytest-ordering）
    second: 第二个运行（pytest-ordering）
    second_to_last: 倒数第二个运行（pytest-ordering）
    smoke: 冒烟测试
    regression: 回归测试
    slow: 耗时较长的用例

# 日志配置（可选，与 logs 模块配合）
log_cli = false
log_cli_level = INFO

# 最小版本要求
minversion = 7.0
